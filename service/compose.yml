services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "5000:6379"
    volumes:
      - ../../data/redis:/data
    command: sh -c "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  # ----------------------------------------------------------
  #  MySQL 8
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "5001:3306"
    volumes:
      - ../../data/mysql:/var/lib/mysql
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "5002:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - app_net

  # ----------------------------------------------------------
  #  RabbitMQ 3 (带 Management UI)
  #  AMQP : 5672
  #  Web UI: http://localhost:15672  (guest / CHANGE_ME)
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "5003:5672" # AMQP
      - "5004:15672" # Management Web UI
    volumes:
      - ../../data/rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app_net

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: hjj123
      POSTGRES_DB: mydb
      # 可选:自定义数据目录的子路径
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5005:5432"
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: 2969054528@qq.com
      PGADMIN_DEFAULT_PASSWORD: hjj123
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
    ports:
      - "5006:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - app_net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5007:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    external: true

volumes:
  pgadmin_data:
  redisinsight_data:
