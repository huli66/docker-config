services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "2888:80"  # 宿主机 2888 → 容器 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./conf.d:/etc/nginx/conf.d
      - ./html:/usr/share/nginx/html
    networks:
      - app_net

networks:
  app_net:
    external: true